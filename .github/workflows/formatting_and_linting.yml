---
on:
  push:
    branches-ignore:
      - main
permissions:
  contents: read

jobs:
  formatting_and_linting:
    permissions:
      contents: write  # for Git to git push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        if: github.actor != 'dependabot[bot]'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.1.1
        with:
          token: ${{ secrets.COMMIT_TOKEN }}

      - name: Checkout project (dependabot)
        if: github.actor == 'dependabot[bot]'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.1.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Set up cache for Python dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[formatting]

      - name: Run ruff formatting
        run: |
          ruff format .

      - name: Run ruff linting
        run: |
          ruff check --fix

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Formatting and linting commit" || true
          git push

      - name: Run mypy
        run: |
          mypy --strict fia_api
